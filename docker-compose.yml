# ============================================
# 10s Only — Docker Compose (full stack)
# ============================================
# Boots: Spring Boot backend (MongoDB Atlas) + Next.js frontend
# Usage:
#   1. Copy .env.example → .env and fill in Razorpay keys
#   2. docker compose up --build
#   3. Visit http://localhost:3000

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tensonly-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_OTP_PROVIDER: console
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: tensonly-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ./.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
