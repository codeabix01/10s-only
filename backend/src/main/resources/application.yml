spring:
  data:
    mongodb:
      uri: "${MONGODB_URI:mongodb://localhost:27017/tensonly?retryWrites=true&w=majority&connectTimeoutMS=10000&socketTimeoutMS=30000&serverSelectionTimeoutMS=10000}"
      auto-index-creation: ${MONGODB_AUTO_INDEX_CREATION:false}
      ssl:
        enabled: ${MONGODB_SSL_ENABLED:true}
        invalid-host-name-allowed: ${MONGODB_SSL_INVALID_HOSTNAME_ALLOWED:false}

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: "${APP_JWT_SECRET}"
    expiration-ms: 86400000
  razorpay:
    key-id: "${RAZORPAY_KEY_ID}"
    key-secret: "${RAZORPAY_KEY_SECRET}"
    platform-fee-percent: ${APP_COMMISSION_PERCENT:2.0}
    gst-percent: ${APP_GST_PERCENT:0.9}
  cors:
    allowed-origins: "${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}"
  otp:
    provider: "${APP_OTP_PROVIDER:console}"
  auth:
    admin-emails: ${APP_ADMIN_EMAILS:abixspeaks@gmail.com,ops@10sonly.club}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
